name: Sync Nodes

concurrency:
  group: sync-nodes
  cancel-in-progress: false

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    if: github.repository == 'lawdachuss/node-1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync to all node repos
        env:
          SYNC_PAT: ${{ secrets.SYNC_PAT }}
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
        run: |
          set -e
          # Unset the auth header set by actions/checkout so URL credentials are used
          git config --local --unset-all http.https://github.com/.extraheader 2>/dev/null || true
          for repo in lawdachuss/node-2 lawdachuss/node-3 lawdachuss/node-4 lawdachuss/node-5; do
            echo "=== Processing $repo ==="
            # Cancel any active secure-rdp.yml runs so the push triggers a fresh deployment
            activeRuns=$(gh run list --repo "$repo" --workflow secure-rdp.yml --limit 10 --json databaseId,status 2>/dev/null | jq -r '.[] | select(.status == "in_progress" or .status == "queued" or .status == "pending") | .databaseId')
            if [ -n "$activeRuns" ]; then
              for runId in $activeRuns; do
                echo "  Cancelling active run $runId on $repo..."
                gh run cancel "$runId" --repo "$repo" 2>/dev/null || true
              done
              # Wait briefly for cancel to propagate before pushing
              sleep 10
            fi
            git push --force "https://${SYNC_PAT}@github.com/${repo}.git" main
            echo "[OK] $repo synced"
          done
          echo "All nodes synced successfully."
